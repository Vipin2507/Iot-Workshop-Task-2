<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Multi-Sensor Dashboard 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            boxShadow: {
              soft: "0 10px 30px rgba(2, 6, 23, 0.12)"
            }
          }
        }
      };
    </script>
  </head>
  <body class="h-full bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <div class="absolute -top-40 -right-40 w-[520px] h-[520px] rounded-full bg-gradient-to-br from-blue-400/30 to-cyan-300/10 blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-[520px] h-[520px] rounded-full bg-gradient-to-tr from-indigo-400/20 to-purple-300/10 blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-md">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-2 text-slate-900 dark:text-white">
          <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-600 to-cyan-500 shadow-sm"></div>
          <div>
            <div class="font-bold leading-5">Multi-Sensor Dashboard</div>
            <div class="text-xs text-slate-500 dark:text-slate-400">2026 Edition</div>
          </div>
        </div>
        <button id="themeBtn" class="px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/70 dark:bg-slate-900/60 backdrop-blur hover:bg-white dark:hover:bg-slate-900 text-sm text-slate-700 dark:text-slate-200">
          Theme
        </button>
      </div>

      <div class="bg-white/80 dark:bg-slate-900/70 backdrop-blur border border-slate-200 dark:border-slate-800 rounded-2xl shadow-soft p-6">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Welcome back</h1>
          <p class="text-slate-600 dark:text-slate-300">Login to continue</p>
        </div>

        <div id="errorBox" class="hidden mb-4 p-3 rounded-xl bg-red-50 border border-red-200 text-red-700"></div>

        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Email</label>
            <input
              id="email"
              type="email"
              class="mt-1 w-full border border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-950/40 rounded-xl px-3 py-2.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-blue-200/70 dark:focus:ring-blue-500/20"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Password</label>
            <input
              id="password"
              type="password"
              class="mt-1 w-full border border-slate-200 dark:border-slate-800 bg-white/90 dark:bg-slate-950/40 rounded-xl px-3 py-2.5 text-slate-900 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-4 focus:ring-blue-200/70 dark:focus:ring-blue-500/20"
              placeholder="Your password"
              required
              autocomplete="current-password"
            />
          </div>

          <button
            id="loginBtn"
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-700 hover:to-cyan-600 text-white px-4 py-2.5 rounded-xl shadow-sm"
          >
            Login
          </button>
        </form>

        <div class="mt-5 text-sm text-slate-600 dark:text-slate-300">
          New user?
          <a href="/pages/register.html" class="text-blue-600 dark:text-cyan-300 hover:underline">Create an account</a>
        </div>
      </div>
    </div>

    <script>
      const errorBox = document.getElementById("errorBox");
      const form = document.getElementById("loginForm");
      const themeBtn = document.getElementById("themeBtn");
      const loginBtn = document.getElementById("loginBtn");

      function applyTheme(theme) {
        if (theme === "dark") document.documentElement.classList.add("dark");
        else document.documentElement.classList.remove("dark");
      }

      const savedTheme = localStorage.getItem("theme") || "light";
      applyTheme(savedTheme);

      themeBtn.addEventListener("click", () => {
        const next = document.documentElement.classList.contains("dark") ? "light" : "dark";
        localStorage.setItem("theme", next);
        applyTheme(next);
      });

      function showError(msg) {
        errorBox.textContent = msg;
        errorBox.classList.remove("hidden");
      }

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorBox.classList.add("hidden");

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
          loginBtn.disabled = true;
          loginBtn.classList.add("opacity-80");
          const res = await fetch("/api/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();
          if (!data.success) return showError(data.error || "Login failed");
          window.location.href = "/pages/dashboard.html";
        } catch (err) {
          showError("Network error");
        } finally {
          loginBtn.disabled = false;
          loginBtn.classList.remove("opacity-80");
        }
      });
    </script>
  </body>
</html>
